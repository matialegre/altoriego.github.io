<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTO RIEGO - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2>🔒 Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Nombre de usuario" required>
                <button type="submit" class="btn on-btn">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- Dashboard (oculto inicialmente) -->
    <div class="dashboard" id="dashboard">
        <header>
            <h1>🌿 ALTO RIEGO - <span id="currentUser"></span></h1>
            <p class="status" id="status">⏳ Conectando...</p>
            <button class="btn off-btn" onclick="logout()">Cerrar sesión</button>
        </header>

        <main>
            <section class="controls">
                <button class="btn on-btn" onclick="publishCommand('ON')">💧 Encender Riego</button>
                <button class="btn off-btn" onclick="publishCommand('OFF')">🛑 Apagar Riego</button>
            </section>

            <section class="data">
                <div class="data-box">
                    <h2>🌱 Humedad del Suelo</h2>
                    <p id="humedad" class="data-value">-- %</p>
                </div>
                <div class="data-box">
                    <h2>🌡️ Temperatura</h2>
                    <p id="temperatura" class="data-value">-- °C</p>
                </div>
            </section>

            <section class="chart-container">
                <canvas id="chartCanvas"></canvas>
            </section>

            <!-- Chat y Estado de Usuarios -->
            <section class="chat-section">
                <h2>💬 Chat & Estado</h2>

                <div class="online-users">
                    <h3>Usuarios Conectados (<span id="onlineCount">0</span>)</h3>
                    <div id="userList"></div>
                </div>

                <div class="chat-box">
                    <div id="chatMessages"></div>
                    <input type="text" id="chatInput" placeholder="Escribe un mensaje...">
                    <button class="btn on-btn" onclick="sendMessage()">Enviar</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
