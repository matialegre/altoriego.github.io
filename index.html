<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTO RIEGO - Dashboard</title>
    
    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Librerías -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>🌿 ALTO RIEGO</h1>
            <p class="status" id="status">⏳ Conectando...</p>
        </header>

        <main>
            <section class="controls">
                <button class="btn on-btn" onclick="publishCommand('ON')">💧 Encender Riego</button>
                <button class="btn off-btn" onclick="publishCommand('OFF')">🛑 Apagar Riego</button>
            </section>

            <section class="data">
                <div class="data-box">
                    <h2>🌱 Humedad del Suelo</h2>
                    <p id="humedad" class="data-value">-- %</p>
                </div>
                <div class="data-box">
                    <h2>🌡️ Temperatura</h2>
                    <p id="temperatura" class="data-value">-- °C</p>
                </div>
            </section>

            <section class="chart-container">
                <canvas id="chartCanvas"></canvas>
            </section>
        </main>
    </div>

    <!-- Enlace al JavaScript -->
    <script src="app.js"></script>

</body>
</html>
